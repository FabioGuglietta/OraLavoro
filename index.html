<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fine lavoro</title>

<style>
:root {
    color-scheme: light dark;
}

body {
    margin: 0;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    background: linear-gradient(160deg, #e8edf7, #f7f7fb);
}

.card {
    max-width: 520px;
    margin: auto;
    background: rgba(255,255,255,0.90);
    border-radius: 28px;
    padding: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.16);
    backdrop-filter: blur(18px);
}

h1 {
    margin: 0;
    font-size: 30px;
    letter-spacing: -0.5px;
}

.subtitle {
    margin-top: 8px;
    margin-bottom: 22px;
    color: #666;
    font-size: 16px;
}

label {
    display: block;
    font-weight: 700;
    margin-bottom: 10px;
}

.wheel-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

.wheel-wrapper::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: 50px;
    height: 50px;
    border-radius: 14px;
    background: rgba(17,24,39,0.08);
    pointer-events: none;
}

.wheel {
    flex: 1;
    height: 150px;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    border: 1px solid #d1d5db;
    border-radius: 18px;
    background: white;
    text-align: center;
    font-family: Menlo, Monaco, Consolas, monospace;
    font-size: 28px;
    font-weight: 800;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
}

.wheel::-webkit-scrollbar {
    display: none;
}

.wheel-item {
    height: 50px;
    line-height: 50px;
    scroll-snap-align: center;
    color: #9ca3af;
    transition: color 0.12s ease, font-size 0.12s ease, opacity 0.12s ease;
}

.wheel-item.selected {
    color: #111827;
    font-size: 34px;
    opacity: 1;
}

.colon {
    font-size: 34px;
    font-weight: 900;
    color: #374151;
    z-index: 1;
}

.main-button {
    width: 100%;
    padding: 15px 18px;
    font-size: 18px;
    font-weight: 800;
    border: none;
    border-radius: 14px;
    background: #111827;
    color: white;
    margin-bottom: 20px;
}

.targetBox {
    background: #111827;
    color: white;
    border-radius: 22px;
    padding: 18px;
    margin-bottom: 24px;
    display: none;
}

.targetLabel {
    font-size: 13px;
    opacity: 0.75;
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

.targetTime {
    font-size: 42px;
    font-weight: 800;
    margin-top: 4px;
    font-family: Menlo, Monaco, Consolas, monospace;
}

.targetSub {
    margin-top: 10px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.18);
}

.targetSubLabel {
    font-size: 12px;
    opacity: 0.75;
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

.targetSubTime {
    font-size: 28px;
    font-weight: 800;
    margin-top: 4px;
    font-family: Menlo, Monaco, Consolas, monospace;
}

.error {
    display: none;
    color: #dc2626;
    font-weight: 800;
    margin-bottom: 18px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 17px;
    display: none;
}

th {
    text-align: left;
    color: #6b7280;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 10px 0;
    border-bottom: 1px solid #d1d5db;
}

td {
    padding: 13px 0;
    border-bottom: 1px solid #e5e7eb;
}

.time {
    font-family: Menlo, Monaco, Consolas, monospace;
    font-weight: 700;
}

.neg {
    color: #dc2626;
    font-weight: 800;
}

.pos {
    color: #16a34a;
    font-weight: 800;
}

.target {
    color: #d97706;
    font-weight: 900;
}

.footer {
    margin-top: 18px;
    color: #6b7280;
    font-size: 13px;
    line-height: 1.35;
    display: none;
}

@media (prefers-color-scheme: dark) {
    body {
        background: linear-gradient(160deg, #111827, #030712);
    }

    .card {
        background: rgba(31,41,55,0.92);
        color: #f9fafb;
    }

    .subtitle,
    .footer {
        color: #9ca3af;
    }

    .wheel-wrapper::before {
        background: rgba(249,250,251,0.10);
    }

    .wheel {
        background: #111827;
        border-color: #4b5563;
    }

    .wheel-item {
        color: #6b7280;
    }

    .wheel-item.selected {
        color: #f9fafb;
    }

    .colon {
        color: #f9fafb;
    }

    .main-button {
        background: #f9fafb;
        color: #111827;
    }

    th {
        color: #9ca3af;
        border-bottom-color: #4b5563;
    }

    td {
        border-bottom-color: #374151;
    }

    .targetBox {
        background: #f9fafb;
        color: #111827;
    }

    .targetSub {
        border-top-color: rgba(17,24,39,0.14);
    }
}
</style>
</head>

<body>
<div class="card">
    <h1>Fine lavoro</h1>
    <div class="subtitle">Calcolo automatico rispetto al target di 7h42min</div>

    <label>Orario ingresso</label>

    <div class="wheel-wrapper">
        <div class="wheel" id="hourWheel"></div>
        <div class="colon">:</div>
        <div class="wheel" id="minuteWheel"></div>
    </div>

    <button class="main-button" onclick="calcola()">Calcola</button>

    <div id="error" class="error"></div>

    <div id="targetBox" class="targetBox">
        <div>
            <div class="targetLabel">Uscita target</div>
            <div id="targetTime" class="targetTime">--:--</div>
        </div>

        <div class="targetSub">
            <div class="targetSubLabel">Buoni pasto (6h30min)</div>
            <div id="mealTime" class="targetSubTime">--:--</div>
        </div>
    </div>

    <table id="results">
        <thead>
            <tr>
                <th>Uscita</th>
                <th>Lavoro</th>
                <th>Saldo</th>
            </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
    </table>

    <div id="footer" class="footer">
        Rosso: minuti mancanti · Verde: minuti extra · Giallo: target esatto
    </div>
</div>

<script>
let selectedHour = 8;
let selectedMinute = 30;

function formatTime(total) {
    total = ((total % 1440) + 1440) % 1440;
    const h = Math.floor(total / 60);
    const m = total % 60;
    return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
}

function formatWork(total) {
    if (total < 0) total = 0;
    const h = Math.floor(total / 60);
    const m = total % 60;
    return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
}

function makeRow(currentTime, startMinutes, targetWork) {
    const worked = currentTime - startMinutes;
    const extra = worked - targetWork;

    let saldo = "";
    let cls = "";

    if (extra > 0) {
        saldo = "+" + String(extra).padStart(3, "0") + " min";
        cls = "pos";
    } else if (extra < 0) {
        saldo = "-" + String(-extra).padStart(3, "0") + " min";
        cls = "neg";
    } else {
        saldo = "target";
        cls = "target";
    }

    return `
        <tr>
            <td class="time">${formatTime(currentTime)}</td>
            <td>${formatWork(worked)}</td>
            <td class="${cls}">${saldo}</td>
        </tr>
    `;
}

function buildWheel(id, min, max, initial, onChange) {
    const wheel = document.getElementById(id);
    wheel.innerHTML = "";

    const spacerTop = document.createElement("div");
    spacerTop.className = "wheel-item";
    spacerTop.textContent = "";
    wheel.appendChild(spacerTop);

    for (let value = min; value <= max; value++) {
        const item = document.createElement("div");
        item.className = "wheel-item";
        item.dataset.value = value;
        item.textContent = String(value).padStart(2, "0");
        wheel.appendChild(item);
    }

    const spacerBottom = document.createElement("div");
    spacerBottom.className = "wheel-item";
    spacerBottom.textContent = "";
    wheel.appendChild(spacerBottom);

    function updateSelected() {
        const center = wheel.scrollTop + wheel.clientHeight / 2;
        const items = Array.from(wheel.querySelectorAll(".wheel-item[data-value]"));

        let closest = items[0];
        let minDistance = Infinity;

        items.forEach(item => {
            const itemCenter = item.offsetTop + item.offsetHeight / 2;
            const distance = Math.abs(center - itemCenter);

            if (distance < minDistance) {
                minDistance = distance;
                closest = item;
            }
        });

        items.forEach(item => item.classList.remove("selected"));
        closest.classList.add("selected");

        onChange(parseInt(closest.dataset.value, 10));
    }

    let scrollTimer = null;

    wheel.addEventListener("scroll", () => {
        updateSelected();

        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
            const selected = wheel.querySelector(".wheel-item.selected");
            if (selected) {
                selected.scrollIntoView({
                    behavior: "smooth",
                    block: "center"
                });
            }
        }, 120);
    });

    setTimeout(() => {
        const initialItem = wheel.querySelector(`[data-value="${initial}"]`);
        if (initialItem) {
            initialItem.scrollIntoView({
                behavior: "instant",
                block: "center"
            });
        }
        updateSelected();
    }, 0);
}

function initWheels() {
    buildWheel("hourWheel", 0, 23, 8, value => {
        selectedHour = value;
    });

    buildWheel("minuteWheel", 0, 59, 30, value => {
        selectedMinute = value;
    });
}

function calcola() {
    const hh = selectedHour;
    const mm = selectedMinute;

    const error = document.getElementById("error");
    const table = document.getElementById("results");
    const body = document.getElementById("resultsBody");
    const targetBox = document.getElementById("targetBox");
    const targetTimeElement = document.getElementById("targetTime");
    const mealTimeElement = document.getElementById("mealTime");
    const footer = document.getElementById("footer");

    error.style.display = "none";
    error.textContent = "";
    body.innerHTML = "";
    table.style.display = "none";
    targetBox.style.display = "none";
    footer.style.display = "none";

    if (Number.isNaN(hh) || Number.isNaN(mm) || hh < 0 || hh > 23 || mm < 0 || mm > 59) {
        error.textContent = "Orario non valido.";
        error.style.display = "block";
        return;
    }

    const startMinutes = hh * 60 + mm;
    const targetWork = 7 * 60 + 42;
    const mealWork = 6 * 60 + 30;

    const targetTime = startMinutes + targetWork;
    const mealTime = startMinutes + mealWork;

    const lowerLimit = 12 * 60;
    const finalLimit = 19 * 60;

    let html = "";

    let prevSlot = Math.floor(targetTime / 30) * 30;

    if (prevSlot === targetTime) {
        prevSlot -= 30;
    }

    let before = [];

    while (prevSlot >= lowerLimit) {
        before.push(prevSlot);
        prevSlot -= 30;
    }

    before.reverse().forEach(slot => {
        html += makeRow(slot, startMinutes, targetWork);
    });

    html += makeRow(targetTime, startMinutes, targetWork);

    let nextSlot = (Math.floor(targetTime / 30) + 1) * 30;

    while (nextSlot <= finalLimit) {
        html += makeRow(nextSlot, startMinutes, targetWork);
        nextSlot += 30;
    }

    targetTimeElement.textContent = formatTime(targetTime);
    mealTimeElement.textContent = formatTime(mealTime);
    body.innerHTML = html;

    targetBox.style.display = "block";
    table.style.display = "table";
    footer.style.display = "block";
}

initWheels();
</script>
</body>
</html>
